<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GOODFUN TEAM ｜ 孤芳小隊</title>
<meta name="description" content="孤芳小隊 GOODFUN TEAM — 獨立藝術創作單位。關注日常環境中的結構、使用痕跡與暫停狀態。">
<meta property="og:title" content="GOODFUN TEAM ｜ 孤芳小隊">
<meta property="og:description" content="獨立藝術創作單位。透過攝影、印刷物件與立體裝置，捕捉城市中被遺忘的微小連線。">
<meta property="og:image" content="logo.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body class="sphere-page">

<header class="site-header">
  <div class="brand" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="cursor:pointer;">
    <div class="brand-dot"><img src="logo.png" alt="GOODFUN TEAM"></div>
    <span>GOODFUN TEAM</span>
  </div>
  <nav class="nav-links" id="navlinks">
    <a href="index.html" id="nav-works" class="active">作品</a>
    <a href="events.html" id="nav-events">活動</a>
    <a href="shop.html" id="nav-shop">商店</a>
    <a href="about.html" id="nav-about">關於</a>
    <button id="lang-toggle" class="lang-toggle">EN</button>
  </nav>
</header>

<main>
  <div id="sphere-stage">
    <div id="sphere-world"></div>
  </div>
</main>

<div id="detail-overlay">
  <h2 id="detail-title"></h2>
  <div class="marquee-row marquee-top"><div class="marquee-track" id="marquee-top"></div></div>
  <div id="detail-img-slot"><img id="detail-img" src="" alt=""></div>
  <div class="marquee-row marquee-bottom"><div class="marquee-track" id="marquee-bottom"></div></div>
</div>

<div id="camera-overlay">
  <video id="camera-video" autoplay playsinline muted></video>
  <canvas id="camera-canvas" style="display:none;"></canvas>
  <p id="camera-hint">將鏡頭對準想拍的畫面</p>
  <p id="camera-error"></p>
  <div class="camera-controls">
    <button id="camera-cancel" aria-label="取消拍照"><i class="ti ti-x" aria-hidden="true"></i></button>
    <button id="camera-shutter" aria-label="拍照"></button>
    <span class="camera-controls-spacer"></span>
  </div>
</div>

<script src="common.js"></script>
<script src="lang.js"></script>
<script>
var WORKS = [
  { img: "horse_card.jpg",
    zh: { title: "馬年賀卡", desc: "明信片／孔版印刷。以馬年為主題，先以黏土手作並上色完成角色原型，再進行拍攝與分色製版。\n畫面中，孤芳小隊的角色「鼠」與「雪貂」坐上賽馬造型的搖搖馬，隱喻在追逐目標的過程中，看似前進，卻可能仍停留原地。" },
    en: { title: "Year of Horse Card", desc: "Postcard / Risograph. Characters ride rocking horses as a metaphor for moving while staying in place." } },
  { img: "inplace.jpg",
    zh: { title: "空心 IN PLACE", desc: "攝影折頁小誌 × 水泥物件。創作始於 2024 年底移居台北後，持續觀察街頭被反覆使用的空心磚。\n透過攝影與折頁小誌形式，想像每一塊磚都在其位置中履行任務。" },
    en: { title: "IN PLACE", desc: "Photography fold-out zine with concrete object, observing hollow bricks in the streets of Taipei." } },
  { img: "softdrinks.jpg",
    zh: { title: "Soft Drinks", desc: "攝影 × 包裝設計。將 2023–2025 年間收集的酒罐影像轉化為絲巾圖像，並封裝於鋁罐中。唯有「開罐」才能取出絲巾，對應飲酒行為的不可逆性。" },
    en: { title: "Soft Drinks", desc: "Scarves featuring beer can imagery, packaged in aluminum cans that must be 'opened' to access." } },
  { img: "30hours.jpg",
    zh: { title: "30時間 2nd Ed.", desc: "攝影小誌 (A5)。以「30 小時制」為概念，透過實際行走與感受，用底片記錄新宿與涉谷的城市節奏。" },
    en: { title: "30 Hours 2nd Ed.", desc: "A photography zine documenting the rhythms of Shinjuku and Shibuya through a 30-hour temporal lens." } },
  { img: "handit.jpg",
    zh: { title: "Hand-it 手心貼", desc: "文具設計。靈感來自把重要事情寫在手上，卻難以洗掉的生活經驗。將「手心」轉化為可張貼的便利貼造型。" },
    en: { title: "Hand-it", desc: "Sticky notes that transform the palm into a writable surface." } },
  { img: "pastebook.jpg",
    zh: { title: "PastePort 貼紙簿", desc: "貼紙冊。以街頭貼紙文化為起點，收集台灣街頭可能出現的貼紙場景，整理成 ZINE。" },
    en: { title: "PastePort", desc: "A sticker book recording street scenes in Taiwan." } },
  { img: "passter.jpg",
    zh: { title: "PASSTER 貼紙組", desc: "貼紙。將街頭物件與標語轉化為可自由張貼的貼紙。使用者在城市中經過、停留並貼上，成為留下痕跡的「PASSTER」。" },
    en: { title: "PASSTER", desc: "A sticker set derived from PASTE BOOK, allowing users to leave their own traces." } },
  { img: "candle.jpg",
    zh: { title: "燭籤 Lucky Candle", desc: "樹脂、紙張。以台灣經典生日「問號蠟燭」為靈感，設計成幸運小物。象徵「最後一個願望，留給自己」。" },
    en: { title: "Lucky Candle", desc: "A lucky object inspired by classic birthday candles." } },
  { img: "pipo.jpg",
    zh: { title: "PIPO君 張子", desc: "立體角色張子。以張子形式重製東京警視廳吉祥物「ピーポくん」，透過手作轉譯，將公共角色轉化為個人收藏物件。" },
    en: { title: "PIPO-KUN Papier-mâché", desc: "A hand-crafted papier-mâché reinterpretation of 'Pipo-kun'." } },
  { img: "radio.jpg",
    zh: { title: "孤芳收音機", desc: "立體裝置。以聲音作為「訊號」與「連線」的隱喻，描繪角色在城市噪音中彼此接收與回應的狀態。" },
    en: { title: "GOODFUN Radio", desc: "An installation using sound as a metaphor for signal and connection." } }
];
var CUR_LANG = window.GFLang ? window.GFLang.get() : 'zh';
function T(work) { return work[CUR_LANG] || work.zh; }

(function () {
  var world = document.getElementById('sphere-world');
  var stage = document.getElementById('sphere-stage');
  var isMobile = window.innerWidth < 640;
  var LAYERS = [150, 190, 230];
  var PER_LAYER = isMobile ? 12 : 18;
  var BASE_SIZE = isMobile ? 78 : 100;
  stage.style.perspective = (isMobile ? 240 : 220) + 'px';
  var cards = [];

  function place(count, radius, angleOffset) {
    var pts = [];
    for (var i = 0; i < count; i++) {
      var y = 1 - (i / (count - 1)) * 2;
      var rad = Math.sqrt(1 - y * y);
      var theta = Math.PI * (3 - Math.sqrt(5)) * i + angleOffset;
      var x = Math.cos(theta) * rad;
      var z = Math.sin(theta) * rad;
      var phi = Math.acos(y);
      var lon = theta;
      pts.push({ x: x, y: y, z: z, lon: lon, phi: phi, radius: radius });
    }
    return pts;
  }

  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var totalSlots = LAYERS.length * PER_LAYER;
  var cameraSlotIndex = Math.floor(Math.random() * totalSlots);

  var pending = [];
  var globalIndex = 0;
  LAYERS.forEach(function (R, layerIdx) {
    var layerPts = place(PER_LAYER, R, layerIdx * 1.4);
    var sizeStep = isMobile ? 8 : 8;
    layerPts.forEach(function (p, i) {
      var size = BASE_SIZE + (i % 4) * sizeStep + layerIdx * (isMobile ? 6 : 6);
      var el = document.createElement('div');
      var finalT = 'rotateY(' + (p.lon*180/Math.PI) + 'deg) rotateX(' + (-(p.phi*180/Math.PI-90)) + 'deg) translateZ(' + (-p.radius) + 'px) scale(1)';
      var startT = 'rotateY(' + (p.lon*180/Math.PI) + 'deg) rotateX(' + (-(p.phi*180/Math.PI-90)) + 'deg) translateZ(' + (-p.radius) + 'px) scale(0.15)';
      el.style.cssText = 'top:' + (-size/2) + 'px; left:' + (-size/2) + 'px; width:' + size + 'px; height:' + size + 'px; transform:' + (reduceMotion ? finalT : startT) + '; transition-delay:' + (reduceMotion ? 0 : Math.min(globalIndex * 10, 1100)) + 'ms;';

      if (globalIndex === cameraSlotIndex) {
        el.className = 'sphere-card camera-card';
        el.innerHTML = '<i class="ti ti-camera" style="font-size:' + Math.round(size * 0.4) + 'px;" aria-hidden="true"></i>';
        el.setAttribute('aria-label', CUR_LANG === 'zh' ? '用相機拍一張加入球體' : 'Take a photo to add to the sphere');
        el.onclick = function () { window.openCamera(); };
        el.onkeydown = function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); window.openCamera(); } };
      } else {
        var w = WORKS[globalIndex % WORKS.length];
        el.className = 'sphere-card';
        el.innerHTML = '<img src="' + w.img + '" alt="' + T(w).title + '" loading="lazy">';
        (function (work, cardEl) {
          cardEl.onclick = function () { openWork(work, cardEl); };
          cardEl.onkeydown = function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openWork(work, cardEl); } };
        })(w, el);
        el.setAttribute('aria-label', T(w).title);
      }
      el.setAttribute('role', 'button');
      el.setAttribute('tabindex', '0');
      world.appendChild(el);
      cards.push({ el: el, wx: -p.z, wy: p.y, wz: -p.x });
      if (!reduceMotion) pending.push({ el: el, t: finalT });
      globalIndex++;
    });
  });

  if (pending.length) {
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        pending.forEach(function (item) { item.el.style.transform = item.t; });
      });
    });
  }

  var rotY = 0, rotX = 0;
  var dragging = false, lastX = 0, lastY = 0, autoSpin = true;
  var worldScale = 1;
  var locked = false;

  function currentZ(c, rxDeg, ryDeg) {
    var rx = rxDeg * Math.PI / 180, ry = ryDeg * Math.PI / 180;
    var x1 = c.wx * Math.cos(ry) + c.wz * Math.sin(ry);
    var z1 = -c.wx * Math.sin(ry) + c.wz * Math.cos(ry);
    return c.wy * Math.sin(rx) + z1 * Math.cos(rx);
  }

  function update() {
    if (autoSpin && !locked) rotY += 0.12;
    world.style.transform = 'translate(-50%,-50%) scale(' + worldScale + ') rotateX(' + rotX + 'deg) rotateY(' + rotY + 'deg)';
    for (var i = 0; i < cards.length; i++) {
      var c = cards[i];
      var zc = currentZ(c, rotX, rotY);
      var closeness = (zc - 0.35) / 0.35;
      closeness = Math.max(0, Math.min(1, closeness));
      if (c.el.dataset.flying !== '1') {
        c.el.style.opacity = (1 - closeness).toFixed(2);
      }
      c.el.style.pointerEvents = (closeness > 0.5 || locked) ? 'none' : 'auto';
    }
    requestAnimationFrame(update);
  }
  update();

  stage.addEventListener('pointerdown', function (e) {
    if (locked) return;
    dragging = true; autoSpin = false; lastX = e.clientX; lastY = e.clientY;
    stage.classList.add('dragging');
  });
  window.addEventListener('pointermove', function (e) {
    if (!dragging) return;
    rotY += (e.clientX - lastX) * 0.3;
    rotX -= (e.clientY - lastY) * 0.3;
    rotX = Math.max(-80, Math.min(80, rotX));
    lastX = e.clientX; lastY = e.clientY;
  });
  window.addEventListener('pointerup', function () {
    if (!dragging) return;
    dragging = false;
    stage.classList.remove('dragging');
    setTimeout(function () { autoSpin = true; }, 1200);
  });

  function tween(from, to, duration, ease, onUpdate, onDone) {
    var start = null;
    function step(ts) {
      if (!start) start = ts;
      var t = Math.min(1, (ts - start) / duration);
      var e = ease(t);
      onUpdate(from + (to - from) * e);
      if (t < 1) requestAnimationFrame(step);
      else if (onDone) onDone();
    }
    requestAnimationFrame(step);
  }
  var easeInQuad = function (t) { return t * t; };
  var easeOutQuad = function (t) { return 1 - (1 - t) * (1 - t); };

  window.SphereControl = {
    pulseIn: function (onDone) {
      locked = true;
      tween(1, 0.4, 320, easeInQuad, function (v) { worldScale = v; }, function () {
        tween(0.4, 1, 380, easeOutQuad, function (v) { worldScale = v; }, onDone);
      });
    },
    pulseOut: function (onDone) {
      tween(1, 0.4, 320, easeInQuad, function (v) { worldScale = v; }, function () {
        tween(0.4, 1, 380, easeOutQuad, function (v) { worldScale = v; }, function () {
          locked = false;
          if (onDone) onDone();
        });
      });
    },
    setCardOpacity: function (el, val) { el.style.opacity = val; },
    addPhotoCard: function (dataUrl) {
      var p = place(1, 205, Math.random() * Math.PI * 2)[0];
      var size = isMobile ? 84 : 108;
      var el = document.createElement('div');
      el.className = 'sphere-card';
      var finalT = 'rotateY(' + (p.lon*180/Math.PI) + 'deg) rotateX(' + (-(p.phi*180/Math.PI-90)) + 'deg) translateZ(' + (-p.radius) + 'px) scale(1)';
      var startT = 'rotateY(' + (p.lon*180/Math.PI) + 'deg) rotateX(' + (-(p.phi*180/Math.PI-90)) + 'deg) translateZ(' + (-p.radius) + 'px) scale(0.1)';
      el.style.cssText = 'top:' + (-size/2) + 'px; left:' + (-size/2) + 'px; width:' + size + 'px; height:' + size + 'px; transform:' + startT + ';';
      el.innerHTML = '<img src="' + dataUrl + '" alt="' + (CUR_LANG === 'zh' ? '你拍的照片' : 'Your photo') + '">';
      var photoWork = {
        img: dataUrl,
        zh: { title: '你拍的照片', desc: '用你的相機即時拍下的照片，只有這次瀏覽看得到，重新整理頁面後就會消失，不會被保存或上傳。' },
        en: { title: 'Your Photo', desc: 'Captured live with your camera. Visible only in this browsing session — it disappears on refresh and is never saved or uploaded.' }
      };
      el.onclick = function () { openWork(photoWork, el); };
      el.setAttribute('role', 'button');
      el.setAttribute('tabindex', '0');
      el.setAttribute('aria-label', T(photoWork).title);
      el.onkeydown = function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openWork(photoWork, el); } };
      world.appendChild(el);
      cards.push({ el: el, wx: -p.z, wy: p.y, wz: -p.x });
      requestAnimationFrame(function () {
        requestAnimationFrame(function () { el.style.transform = finalT; });
      });
    }
  };
})();


var detailState = { open: false, cardEl: null, cardRect: null, flipEl: null };
var marqueeReduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function buildMarquee(text) {
  var t = text.replace(/\n/g, '　').trim();
  return t + '　★　';
}

function setupMarquee(el, dir) {
  var offset = 0;
  var unit = 0;
  function measure() {
    unit = el.scrollWidth / 2;
    offset = dir === 'r' ? -unit : 0;
    el.style.transform = 'translateX(' + offset + 'px)';
  }
  function step() {
    if (!marqueeReduceMotion && unit > 0) {
      if (dir === 'l') {
        offset -= 0.5;
        if (offset <= -unit) offset += unit;
      } else {
        offset += 0.5;
        if (offset >= 0) offset -= unit;
      }
      el.style.transform = 'translateX(' + offset + 'px)';
    }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
  return measure;
}

var marqueeTopEl = document.getElementById('marquee-top');
var marqueeBottomEl = document.getElementById('marquee-bottom');
var remeasureTop = setupMarquee(marqueeTopEl, 'l');
var remeasureBottom = setupMarquee(marqueeBottomEl, 'r');

function openWork(w, cardEl) {
  if (detailState.open || cardEl.dataset.flying === '1') return;
  detailState.open = true;
  detailState.cardEl = cardEl;
  var rect = cardEl.getBoundingClientRect();
  detailState.cardRect = rect;
  cardEl.dataset.flying = '1';
  cardEl.style.opacity = '0';

  document.getElementById('detail-title').textContent = T(w).title;
  var mText = buildMarquee(T(w).desc);
  marqueeTopEl.textContent = mText + mText;
  marqueeBottomEl.textContent = mText + mText;
  remeasureTop();
  remeasureBottom();
  document.getElementById('detail-img').src = w.img;
  document.getElementById('detail-img').alt = T(w).title;

  var flip = document.createElement('img');
  flip.className = 'flip-img';
  flip.src = w.img;
  flip.alt = '';
  flip.style.transition = 'none';
  flip.style.top = rect.top + 'px';
  flip.style.left = rect.left + 'px';
  flip.style.width = rect.width + 'px';
  flip.style.height = rect.height + 'px';
  flip.style.borderRadius = '50%';
  document.body.appendChild(flip);
  detailState.flipEl = flip;
  flip.addEventListener('click', function (e) {
    e.stopPropagation();
    flip.classList.remove('spin');
    void flip.offsetWidth;
    flip.classList.add('spin');
  });

  void flip.offsetWidth;

  window.SphereControl.pulseIn();

  requestAnimationFrame(function () {
    flip.style.transition = '';
    var slot = document.getElementById('detail-img-slot').getBoundingClientRect();
    flip.style.top = slot.top + 'px';
    flip.style.left = slot.left + 'px';
    flip.style.width = slot.width + 'px';
    flip.style.height = slot.height + 'px';
    flip.style.borderRadius = '20px';
  });

  setTimeout(function () {
    document.getElementById('detail-overlay').classList.add('open');
  }, 80);

  document.body.style.overflow = 'hidden';
}

function closeWork() {
  if (!detailState.open) return;
  detailState.open = false;
  document.getElementById('detail-overlay').classList.remove('open');

  var flip = detailState.flipEl;
  var rect = detailState.cardRect;
  if (flip && rect) {
    flip.style.top = rect.top + 'px';
    flip.style.left = rect.left + 'px';
    flip.style.width = rect.width + 'px';
    flip.style.height = rect.height + 'px';
    flip.style.borderRadius = '50%';
  }

  window.SphereControl.pulseOut();

  setTimeout(function () {
    if (flip) flip.remove();
    if (detailState.cardEl) {
      detailState.cardEl.dataset.flying = '';
      detailState.cardEl.style.opacity = '';
    }
    document.body.style.overflow = '';
    detailState.cardEl = null;
    detailState.flipEl = null;
  }, 520);
}

document.getElementById('detail-overlay').addEventListener('click', function (e) {
  if (e.target.id === 'detail-img-slot' || e.target.id === 'detail-img') return;
  closeWork();
});
document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape') { closeWork(); closeCamera(); }
});

var cameraStream = null;

window.openCamera = function () {
  if (detailState.open) return;
  var overlay = document.getElementById('camera-overlay');
  var video = document.getElementById('camera-video');
  var errEl = document.getElementById('camera-error');
  var hintEl = document.getElementById('camera-hint');
  errEl.textContent = '';
  hintEl.style.display = '';
  overlay.classList.add('open');

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    errEl.textContent = CUR_LANG === 'zh' ? '這個瀏覽器不支援相機功能。' : 'Camera is not supported in this browser.';
    hintEl.style.display = 'none';
    return;
  }

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
    .then(function (stream) {
      cameraStream = stream;
      video.srcObject = stream;
    })
    .catch(function (err) {
      hintEl.style.display = 'none';
      errEl.textContent = CUR_LANG === 'zh'
        ? '無法使用相機，請確認已允許網頁存取相機權限。'
        : 'Could not access the camera. Please allow camera permission for this site.';
    });
};

function closeCamera() {
  document.getElementById('camera-overlay').classList.remove('open');
  var video = document.getElementById('camera-video');
  video.srcObject = null;
  if (cameraStream) {
    cameraStream.getTracks().forEach(function (t) { t.stop(); });
    cameraStream = null;
  }
}

function capturePhoto() {
  var video = document.getElementById('camera-video');
  if (!video.videoWidth) return;
  var canvas = document.getElementById('camera-canvas');
  var size = Math.min(video.videoWidth, video.videoHeight);
  canvas.width = size; canvas.height = size;
  var ctx = canvas.getContext('2d');
  var sx = (video.videoWidth - size) / 2;
  var sy = (video.videoHeight - size) / 2;
  ctx.drawImage(video, sx, sy, size, size, 0, 0, size, size);
  var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  closeCamera();
  if (window.SphereControl) window.SphereControl.addPhotoCard(dataUrl);
}

document.getElementById('camera-shutter').addEventListener('click', capturePhoto);
document.getElementById('camera-cancel').addEventListener('click', closeCamera);
document.getElementById('camera-overlay').addEventListener('click', function (e) {
  if (e.target.id === 'camera-overlay') closeCamera();
});
</script>

</body>
</html>
