<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="GOODFUN TEAM ｜ 孤芳小隊">
<meta property="og:description" content="獨立藝術創作單位。透過攝影、印刷物件與立體裝置，捕捉城市中被遺忘的微小連線。">
<meta property="og:image" content="logo.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="brand" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="cursor:pointer;">
    <div class="brand-dot"><img src="logo.png" alt="GOODFUN TEAM"></div>
    <span>GOODFUN TEAM</span>
  </div>
  <button class="nav-toggle" onclick="document.getElementById('navlinks').classList.toggle('open')" aria-label="開啟選單">
    <i class="ti ti-menu-2" aria-hidden="true"></i>
  </button>
  <nav class="nav-links" id="navlinks">
    <a href="index.html" class="active">作品</a>
    <a href="events.html">活動</a>
    <a href="shop.html">商店</a>
    <a href="about.html">關於</a>
  </nav>
</header>

<main>
  <div id="sphere-stage">
    <div id="sphere-world"></div>
  </div>
</main>

<div id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-close" onclick="closeModal()" onkeydown="if(event.key==='Enter'){closeModal()}" role="button" tabindex="0" aria-label="關閉">×</div>
    <div class="modal-img-wrap"><img id="modal-img" src="" alt=""></div>
    <div class="modal-body-inner">
      <h2 id="modal-title"></h2>
      <p id="modal-desc"></p>
    </div>
  </div>
</div>

<script src="common.js"></script>
<script>
var WORKS = [
  { title: "馬年賀卡", img: "horse_card.jpg", desc: "明信片／孔版印刷。以馬年為主題，先以黏土手作並上色完成角色原型，再進行拍攝與分色製版。\n畫面中，孤芳小隊的角色「鼠」與「雪貂」坐上賽馬造型的搖搖馬，隱喻在追逐目標的過程中，看似前進，卻可能仍停留原地。" },
  { title: "空心 IN PLACE", img: "inplace.jpg", desc: "攝影折頁小誌 × 水泥物件。創作始於 2024 年底移居台北後，持續觀察街頭被反覆使用的空心磚。\n透過攝影與折頁小誌形式，想像每一塊磚都在其位置中履行任務。" },
  { title: "Soft Drinks", img: "softdrinks.jpg", desc: "攝影 × 包裝設計。將 2023–2025 年間收集的酒罐影像轉化為絲巾圖像，並封裝於鋁罐中。唯有「開罐」才能取出絲巾，對應飲酒行為的不可逆性。" },
  { title: "30時間 2nd Ed.", img: "30hours.jpg", desc: "攝影小誌 (A5)。以「30 小時制」為概念，透過實際行走與感受，用底片記錄新宿與涉谷的城市節奏。" },
  { title: "Hand-it 手心貼", img: "handit.jpg", desc: "文具設計。靈感來自把重要事情寫在手上，卻難以洗掉的生活經驗。將「手心」轉化為可張貼的便利貼造型。" },
  { title: "PastePort 貼紙簿", img: "pastebook.jpg", desc: "貼紙冊。以街頭貼紙文化為起點，收集台灣街頭可能出現的貼紙場景，整理成 ZINE。" },
  { title: "PASSTER 貼紙組", img: "passter.jpg", desc: "貼紙。將街頭物件與標語轉化為可自由張貼的貼紙。使用者在城市中經過、停留並貼上，成為留下痕跡的「PASSTER」。" },
  { title: "燭籤 Lucky Candle", img: "candle.jpg", desc: "樹脂、紙張。以台灣經典生日「問號蠟燭」為靈感，設計成幸運小物。象徵「最後一個願望，留給自己」。" },
  { title: "PIPO君 張子", img: "pipo.jpg", desc: "立體角色張子。以張子形式重製東京警視廳吉祥物「ピーポくん」，透過手作轉譯，將公共角色轉化為個人收藏物件。" },
  { title: "孤芳收音機", img: "radio.jpg", desc: "立體裝置。以聲音作為「訊號」與「連線」的隱喻，描繪角色在城市噪音中彼此接收與回應的狀態。" }
];

(function () {
  var world = document.getElementById('sphere-world');
  var stage = document.getElementById('sphere-stage');
  var isMobile = window.innerWidth < 640;
  var LAYERS = [150, 190, 230];
  var PER_LAYER = isMobile ? 12 : 18;
  var BASE_SIZE = isMobile ? 46 : 68;
  stage.style.perspective = (isMobile ? 240 : 220) + 'px';
  var cards = [];

  function place(count, radius, angleOffset) {
    var pts = [];
    for (var i = 0; i < count; i++) {
      var y = 1 - (i / (count - 1)) * 2;
      var rad = Math.sqrt(1 - y * y);
      var theta = Math.PI * (3 - Math.sqrt(5)) * i + angleOffset;
      var x = Math.cos(theta) * rad;
      var z = Math.sin(theta) * rad;
      var phi = Math.acos(y);
      var lon = theta;
      pts.push({ x: x, y: y, z: z, lon: lon, phi: phi, radius: radius });
    }
    return pts;
  }

  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var pending = [];
  var globalIndex = 0;
  LAYERS.forEach(function (R, layerIdx) {
    var layerPts = place(PER_LAYER, R, layerIdx * 1.4);
    var sizeStep = isMobile ? 5 : 8;
    layerPts.forEach(function (p, i) {
      var w = WORKS[globalIndex % WORKS.length];
      var size = BASE_SIZE + (i % 4) * sizeStep + layerIdx * (isMobile ? 4 : 6);
      var el = document.createElement('div');
      el.className = 'sphere-card';
      var finalT = 'rotateY(' + (p.lon*180/Math.PI) + 'deg) rotateX(' + (-(p.phi*180/Math.PI-90)) + 'deg) translateZ(' + (-p.radius) + 'px) scale(1)';
      var startT = 'rotateY(' + (p.lon*180/Math.PI) + 'deg) rotateX(' + (-(p.phi*180/Math.PI-90)) + 'deg) translateZ(' + (-p.radius) + 'px) scale(0.15)';
      el.style.cssText = 'top:' + (-size/2) + 'px; left:' + (-size/2) + 'px; width:' + size + 'px; height:' + size + 'px; transform:' + (reduceMotion ? finalT : startT) + '; transition-delay:' + (reduceMotion ? 0 : Math.min(globalIndex * 10, 1100)) + 'ms;';
      el.innerHTML = '<img src="' + w.img + '" alt="' + w.title + '" loading="lazy">';
      (function (work) {
        el.onclick = function () { openWork(work); };
        el.onkeydown = function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openWork(work); } };
      })(w);
      el.setAttribute('role', 'button');
      el.setAttribute('tabindex', '0');
      el.setAttribute('aria-label', w.title);
      world.appendChild(el);
      cards.push({ el: el, wx: -p.z, wy: p.y, wz: -p.x });
      if (!reduceMotion) pending.push({ el: el, t: finalT });
      globalIndex++;
    });
  });

  if (pending.length) {
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        pending.forEach(function (item) { item.el.style.transform = item.t; });
      });
    });
  }

  var rotY = 0, rotX = 0;
  var dragging = false, lastX = 0, lastY = 0, autoSpin = true;


  function currentZ(c, rxDeg, ryDeg) {
    var rx = rxDeg * Math.PI / 180, ry = ryDeg * Math.PI / 180;
    var x1 = c.wx * Math.cos(ry) + c.wz * Math.sin(ry);
    var z1 = -c.wx * Math.sin(ry) + c.wz * Math.cos(ry);
    return c.wy * Math.sin(rx) + z1 * Math.cos(rx);
  }

  function update() {
    if (autoSpin) rotY += 0.12;
    world.style.transform = 'translate(-50%,-50%) rotateX(' + rotX + 'deg) rotateY(' + rotY + 'deg)';
    for (var i = 0; i < cards.length; i++) {
      var c = cards[i];
      var zc = currentZ(c, rotX, rotY);
      var closeness = (zc - 0.5) / 0.4;
      closeness = Math.max(0, Math.min(1, closeness));
      c.el.style.opacity = (1 - closeness).toFixed(2);
      c.el.style.pointerEvents = closeness > 0.5 ? 'none' : 'auto';
    }
    requestAnimationFrame(update);
  }
  update();

  stage.addEventListener('pointerdown', function (e) {
    dragging = true; autoSpin = false; lastX = e.clientX; lastY = e.clientY;
    stage.classList.add('dragging');
  });
  window.addEventListener('pointermove', function (e) {
    if (!dragging) return;
    rotY += (e.clientX - lastX) * 0.3;
    rotX -= (e.clientY - lastY) * 0.3;
    rotX = Math.max(-80, Math.min(80, rotX));
    lastX = e.clientX; lastY = e.clientY;
  });
  window.addEventListener('pointerup', function () {
    if (!dragging) return;
    dragging = false;
    stage.classList.remove('dragging');
    setTimeout(function () { autoSpin = true; }, 1200);
  });
})();

function openWork(w) {
  document.getElementById('modal-img').src = w.img;
  document.getElementById('modal-img').alt = w.title;
  document.getElementById('modal-title').textContent = w.title;
  document.getElementById('modal-desc').textContent = w.desc;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>
