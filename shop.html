<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>商店 Shop ｜ GOODFUN TEAM</title>
<meta name="description" content="孤芳小隊 GOODFUN TEAM 線上商店。">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .shop-wrap { max-width: 960px; margin: 0 auto; padding: 90px 20px 60px; }
  .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
  .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .product-card .p-img { width: 100%; aspect-ratio: 1/1; background: var(--bg); overflow: hidden; }
  .product-card .p-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .product-card .p-body { padding: 14px; }
  .product-card h3 { font-size: 14px; margin: 0 0 4px; }
  .product-card .p-cat { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
  .product-card .p-price { font-family: var(--font-display); font-weight: 700; font-size: 15px; }
  .empty-note { text-align: center; color: var(--text-muted); font-size: 13px; padding: 60px 0; }
</style>
</head>
<body>

<header class="site-header">
  <div class="brand" onclick="location.href='index.html'" style="cursor:pointer;">
    <div class="brand-dot"><img src="logo.png" alt="GOODFUN TEAM"></div>
    <span>GOODFUN TEAM</span>
  </div>
  <button class="nav-toggle" onclick="document.getElementById('navlinks').classList.toggle('open')" aria-label="開啟選單">
    <i class="ti ti-menu-2" aria-hidden="true"></i>
  </button>
  <nav class="nav-links" id="navlinks">
    <a href="index.html">作品</a>
    <a href="events.html">活動</a>
    <a href="shop.html" class="active">商店</a>
    <a href="about.html">關於</a>
  </nav>
</header>

<main>
  <div class="page-hero reveal">
    <h1>商店 Shop</h1>
    <p>目前僅供瀏覽，購物車與結帳功能開發中。</p>
  </div>
  <div class="shop-wrap">
    <div id="shop-grid" class="shop-grid"></div>
  </div>
</main>

<script src="config.js"></script>
<script src="common.js"></script>
<script>
async function loadShop() {
  const grid = document.getElementById('shop-grid');
  const { data, error } = await supabaseClient
    .from('products')
    .select('*')
    .eq('is_active', true)
    .order('created_at', { ascending: false });

  if (error) {
    grid.innerHTML = '<p class="empty-note">商品讀取失敗，請稍後再試。</p>';
    return;
  }
  if (!data.length) {
    grid.innerHTML = '<p class="empty-note">目前沒有上架中的商品，敬請期待。</p>';
    return;
  }
  grid.innerHTML = data.map((p) => `
    <div class="product-card">
      <div class="p-img">${p.image_url ? `<img src="${p.image_url}" alt="${p.name}" loading="lazy">` : ''}</div>
      <div class="p-body">
        <p class="p-cat">${p.category || ''}</p>
        <h3>${p.name}</h3>
        <p class="p-price">NT$ ${Number(p.price).toLocaleString()}</p>
      </div>
    </div>
  `).join('');
}
loadShop();
</script>
</body>
</html>
